{% extends "base.html" %}

{% block content %}
<section class="max-w-xl mx-auto py-16 px-6">

    <div class="bg-white shadow-xl rounded-2xl p-8">

        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-gray-900">
                Editar usuário
            </h2>

            <a href="{% url 'user_detail' user.id %}"
               class="text-sm text-gray-500 hover:text-gray-700">
                Ver detalhes →
            </a>
        </div>

        <!-- Form -->
        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Username
                </label>
                <input type="text" name="username" value="{{ user.username }}"
                       class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
            </div>

            <!-- Tipo -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Tipo
                </label>
                <input type="text" name="tipo" value="{{ user.tipo }}"
                       class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
            </div>

            <!-- Ações -->
            <div class="flex items-center justify-between pt-4">

                <a href="{% url 'user_list' %}"
                   class="text-gray-500 hover:text-gray-700 text-sm">
                    ← Voltar
                </a>

                <button type="submit"
                        class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-semibold shadow hover:bg-blue-700 transition">
                    Salvar alterações
                </button>

            </div>

        </form>

    </div>

</section>
{% endblock %}
