{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Confirmar exclusão</h2>

    <p>Deseja deletar <strong>{{ user.username }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-danger">Sim, deletar</button>
    </form>

    <br>
    <a class="btn btn-secondary" href="{% url 'user_list' %}">Cancelar</a>
</div>
{% endblock %}
