{% extends "base.html" %}

{% block title %}Criar usuário{% endblock %}

{% block content %}
<div class="card">
    <h2>Criar usuário</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-primary">Cadastrar</button>
    </form>

    <br>
    <a class="btn btn-secondary" href="{% url 'user_list' %}">Voltar</a>
</div>
{% endblock %}
