{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Usuários</h2>

    <a class="btn btn-primary" href="{% url 'user_create' %}">
        + Novo usuário
    </a>

    <br><br>

    {% for user in users %}
        <div class="list-item">
            <span>{{ user.username }} - {{ user.tipo }}</span>

            <div>
                <a class="btn btn-secondary" href="{% url 'user_detail' user.id %}">Ver</a>
                <a class="btn btn-primary" href="{% url 'user_update' user.id %}">Editar</a>
                <a class="btn btn-danger" href="{% url 'user_delete' user.id %}">Excluir</a>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
