{% extends "base.html" %}

{% block content %}
<section class="max-w-5xl mx-auto py-12 px-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-2xl font-bold text-gray-900">
            Usuários
        </h2>

        <a href="{% url 'user_create' %}"
           class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-semibold shadow hover:bg-blue-700 transition">
            + Novo usuário
        </a>
    </div>

    <!-- Lista -->
    <div class="bg-white shadow-xl rounded-2xl divide-y">

        {% for user in users %}
        <div class="flex items-center justify-between px-6 py-4 hover:bg-gray-50 transition">

            <!-- Info -->
            <div>
                <p class="font-medium text-gray-800">
                    {{ user.username }}
                </p>
                <p class="text-sm text-gray-500">
                    {{ user.tipo }}
                </p>
            </div>

            <!-- Ações -->
            <div class="flex items-center gap-2">

                <a href="{% url 'user_detail' user.id %}"
                   class="px-3 py-1.5 text-sm rounded-lg bg-gray-100 hover:bg-gray-200 transition">
                    Ver
                </a>

                <a href="{% url 'user_update' user.id %}"
                   class="px-3 py-1.5 text-sm rounded-lg bg-blue-100 text-blue-600 hover:bg-blue-200 transition">
                    Editar
                </a>

                <a href="{% url 'user_delete' user.id %}"
                   class="px-3 py-1.5 text-sm rounded-lg bg-red-100 text-red-600 hover:bg-red-200 transition">
                    Excluir
                </a>

            </div>
        </div>
        {% empty %}
        <div class="p-6 text-center text-gray-500">
            Nenhum usuário cadastrado.
        </div>
        {% endfor %}

    </div>

</section>
{% endblock %}
