{% extends "base.html" %}

{% block content %}
<section class="max-w-2xl mx-auto py-16 px-6">

    <div class="bg-white shadow-xl rounded-2xl p-8">

        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-gray-900">
                Detalhes do usuário
            </h2>

            <a href="{% url 'user_update' user.id %}"
               class="text-sm bg-blue-100 text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-200 transition">
                Editar
            </a>
        </div>

        <!-- Infos -->
        <div class="space-y-4">

            <div class="flex justify-between border-b pb-2">
                <span class="text-gray-500">Username</span>
                <span class="font-medium text-gray-900">{{ user.username }}</span>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span class="text-gray-500">Email</span>
                <span class="font-medium text-gray-900">{{ user.email }}</span>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span class="text-gray-500">Tipo</span>

                <!-- Badge -->
                <span class="px-3 py-1 text-sm rounded-full 
                    {% if user.tipo == 'admin' %}
                        bg-purple-100 text-purple-600
                    {% elif user.tipo == 'monitor' %}
                        bg-blue-100 text-blue-600
                    {% else %}
                        bg-gray-100 text-gray-600
                    {% endif %}
                ">
                    {{ user.tipo }}
                </span>
            </div>

        </div>

        <!-- Footer -->
        <div class="mt-8 flex justify-between items-center">

            <a href="{% url 'user_list' %}"
               class="text-gray-500 hover:text-gray-700 text-sm">
                ← Voltar
            </a>

            <a href="{% url 'user_delete' user.id %}"
               class="text-sm text-red-600 hover:text-red-700">
                Excluir usuário
            </a>

        </div>

    </div>

</section>
{% endblock %}
