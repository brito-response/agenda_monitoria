{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
</head>

<body class="bg-gray-100 text-gray-800">

    {% block header %}
    {% include "header.html" %}
    {% endblock %}

    <!-- Conteúdo -->
    <main class="bg-gray-50 min-h-screen">
        {% block content %}{% endblock %}
    </main>

    {% block footer %}
    {% include "footer.html" %}
    {% endblock %}

    <div id="loginModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-6 relative">
            <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                ✕
            </button>
            <h2 class="text-xl font-bold mb-6 text-gray-900">
                Entrar na conta
            </h2>
            <form method="POST" action="{% url 'login' %}" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Email</label>
                    <input type="email" name="username" required placeholder="seu@email.com"
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-300 text-gray-800 placeholder-gray-400 transition duration-200 shadow-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Senha</label>
                    <input type="password" name="password" required placeholder="********"
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-300  text-gray-800 placeholder-gray-400 transition duration-200 shadow-sm">
                </div>

                <button type="submit"
                    class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-700 transition">Entrar</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            const menuBtn = document.getElementById('menuBtn');
            const mobileMenu = document.getElementById('mobileMenu');

            menuBtn?.addEventListener('click', () => {mobileMenu.classList.toggle('hidden');});


            const loginModal = document.getElementById('loginModal');
            const closeModal = document.getElementById('closeModal');

            // pega TODOS os botões de abrir login
            const loginBtns = document.querySelectorAll('.open-login');

            loginBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    loginModal.classList.remove('hidden');
                    mobileMenu.classList.add('hidden');
                });
            });

            // fechar modal
            closeModal?.addEventListener('click', () => {
                loginModal.classList.add('hidden');
            });

            // fechar clicando fora
            loginModal?.addEventListener('click', (e) => {
                if (e.target === loginModal) {
                    loginModal.classList.add('hidden');
                }
            });

        });
    </script>
</body>

</html>
