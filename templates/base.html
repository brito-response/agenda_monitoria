{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
</head>

<body class="bg-gray-100 text-gray-800">

    <!-- Navbar -->
    <header class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

            <!-- Logo -->
            <a href="/" class="flex items-center gap-2">
                <span class="text-2xl">📘</span>
                <h1 class="text-xl font-bold text-blue-600">Monitoria</h1>
            </a>

            <!-- Menu -->
            <nav class="flex gap-6 text-sm font-medium">
                <a href="/users/" class="text-gray-600 hover:text-blue-600 transition">
                    Usuários
                </a>
                <a href="/horarios/" class="text-gray-600 hover:text-blue-600 transition">
                    Horários
                </a>
            </nav>
        </div>
    </header>

    <!-- Conteúdo -->
    <main class="bg-gray-50 min-h-screen">
        {% block content %}{% endblock %}
    </main>

</body>

</html>
