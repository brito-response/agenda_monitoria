{% extends "base.html" %}

{% block content %}
<h1 class="text-xl font-bold mb-4">Disciplinas</h1>

<a href="/disciplinas/create/" class="bg-blue-600 text-white px-4 py-2 rounded">
    Nova Disciplina
</a>

<ul class="mt-4 space-y-2">
    {% for d in disciplinas %}
        <li class="p-3 bg-white shadow rounded flex justify-between">
            {{ d.nome }}

            <div>
                <a href="/disciplinas/{{ d.id }}/update/" class="text-blue-500">Editar</a>
                <a href="/disciplinas/{{ d.id }}/delete/" class="text-red-500 ml-2">Excluir</a>
            </div>
        </li>
    {% endfor %}
</ul>
{% endblock %}
