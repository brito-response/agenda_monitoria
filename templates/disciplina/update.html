{% extends "base.html" %}

{% block content %}
<h1 class="text-xl font-bold mb-4">Editar Disciplina</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="nome" value="{{ disciplina.nome }}" class="w-full border rounded p-2">

    <button class="bg-blue-600 text-white px-4 py-2 rounded mt-2">
        Atualizar
    </button>
</form>
{% endblock %}
