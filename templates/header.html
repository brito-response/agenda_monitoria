<header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2">
            <span class="text-2xl">📘</span>
            <span class="text-lg font-semibold text-gray-800">Monitoria</span>
        </a>

        <!-- Desktop Menu -->
        <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
            <a href="/users/" class="text-gray-600 hover:text-blue-600">Usuários</a>
            <a href="/horarios/" class="text-gray-600 hover:text-blue-600">Horários</a>

            {% if user.is_authenticated %}
            <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded-lg">
                    Sair
                </button>
            </form>
            {% else %}
            <button class="open-login bg-blue-600 text-white px-4 py-2 rounded-lg">
                Entrar
            </button>
            {% endif %}
        </nav>

        <!-- Mobile Button -->
        <button id="menuBtn" class="md:hidden text-gray-700 text-2xl">
            ☰
        </button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden px-6 pb-4 space-y-3">
        <a href="/users/" class="block text-gray-600">Usuários</a>
        <a href="/horarios/" class="block text-gray-600">Horários</a>

        {% if user.is_authenticated %}
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="w-full bg-red-500 text-white px-4 py-2 rounded-lg">
                Sair
            </button>
        </form>
        {% else %}
        <button class="open-login w-full bg-blue-600 text-white px-4 py-2 rounded-lg">
            Entrar
        </button>
        {% endif %}
    </div>
</header>
