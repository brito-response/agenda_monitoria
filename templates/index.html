{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="max-w-7xl mx-auto px-6 py-16 flex flex-col md:flex-row items-center gap-12">

    <!-- Texto -->
    <div class="flex-1">
        <h1 class="text-4xl md:text-5xl font-bold leading-tight text-gray-900 mb-6">
            Aprenda melhor com <span class="text-blue-600">monitoria</span>
        </h1>

        <p class="text-lg text-gray-600 mb-8">
            Agende horários com monitores da sua disciplina e evolua nos estudos
            de forma prática, rápida e organizada.
        </p>

        <div class="flex items-center gap-4">
            <a href="/horarios/"
               class="bg-blue-600 text-white px-6 py-3 rounded-xl font-semibold shadow hover:bg-blue-700 transition">
                Agendar agora
            </a>

            <span class="text-sm text-gray-500">
                Hoje: {{ data|date:"d/m/Y H:i" }}
            </span>
        </div>
    </div>

    <!-- Imagem -->
    <div class="flex-1 flex justify-center">
        <img src="{% static 'horario.svg' %}"
             alt="Aluno escolhendo horario"
             class="w-full max-w-md drop-shadow-xl">
    </div>

</section>
{% endblock %}
